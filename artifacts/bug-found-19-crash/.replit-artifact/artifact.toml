kind = "web"
previewPath = "/"
title = "Skill Tracker"
version = "1.0.0"
id = "artifacts/bug-found-19-crash"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22163

[services.development]
run = "pnpm --filter @workspace/bug-found-19-crash run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bug-found-19-crash", "run", "build" ]
publicDir = "artifacts/bug-found-19-crash/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22163"
BASE_PATH = "/"
